<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo svg { width: 36px; height: 36px; }
    .logo span { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; text-align: center; }
    .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #374151; }
    input {
      width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 15px; font-family: inherit; transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #1a6b6e; box-shadow: 0 0 0 3px rgba(26,107,110,0.12); }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
      font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s;
      background: #1a6b6e; color: #fff;
    }
    .btn:hover { background: #145458; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; display: none; border: 1px solid #fecaca;
    }
    .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <svg viewBox="0 0 36 36" fill="none"><rect x="2" y="2" width="14" height="14" rx="3" fill="#1a6b6e"/><rect x="20" y="2" width="14" height="14" rx="3" fill="#1a6b6e" opacity="0.6"/><rect x="2" y="20" width="14" height="14" rx="3" fill="#1a6b6e" opacity="0.4"/><rect x="20" y="20" width="14" height="14" rx="3" fill="#1a6b6e" opacity="0.2"/></svg>
      <span>PropFlow</span>
    </div>
    <h1>Sign in to your account</h1>
    <p class="subtitle">Manage your rental properties</p>
    <div class="error" id="error-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn" id="login-btn">Sign In</button>
    </form>
    <div class="footer">PropFlow &middot; Dynamic Tax Services</div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('login-btn');
      var errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        var res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        var data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          errEl.style.display = 'block';
        } else {
          window.location.href = '/';
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  </script>
</body>
</html>
