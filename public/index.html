<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropFlow — Rental Property Management</title>
<meta name="description" content="Rental income collection and expense tracking for property management businesses.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="./app.css">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='12' width='10' height='16' rx='1' fill='%230e7490'/><rect x='18' y='6' width='10' height='22' rx='1' fill='%230e7490' opacity='.7'/><rect x='7' y='15' width='4' height='3' rx='.5' fill='white'/><rect x='7' y='21' width='4' height='3' rx='.5' fill='white'/><rect x='21' y='9' width='4' height='3' rx='.5' fill='white'/><rect x='21' y='15' width='4' height='3' rx='.5' fill='white'/><rect x='21' y='21' width='4' height='3' rx='.5' fill='white'/></svg>">
</head>
<body>
  <a href="#main-content" class="sr-only skip-link">Skip to content</a>

  <!-- Top Navigation Bar -->
  <header class="app-topbar" id="app-topbar">
    <div class="topbar-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-label="PropFlow logo">
        <rect x="4" y="12" width="10" height="16" rx="1.5" fill="currentColor"/>
        <rect x="18" y="6" width="10" height="22" rx="1.5" fill="currentColor" opacity="0.6"/>
        <rect x="7" y="15" width="4" height="3" rx="0.5" fill="var(--color-surface, white)"/>
        <rect x="7" y="21" width="4" height="3" rx="0.5" fill="var(--color-surface, white)"/>
        <rect x="21" y="9" width="4" height="3" rx="0.5" fill="var(--color-surface, white)"/>
        <rect x="21" y="15" width="4" height="3" rx="0.5" fill="var(--color-surface, white)"/>
        <rect x="21" y="21" width="4" height="3" rx="0.5" fill="var(--color-surface, white)"/>
      </svg>
      <span class="topbar-logo-text">PropFlow</span>
    </div>

    <nav class="topbar-tabs" id="topbar-tabs" aria-label="Main navigation">
      <a href="#dashboard" class="tab-btn active" data-page="dashboard">Dashboard</a>
      <a href="#properties" class="tab-btn" data-page="properties">Properties</a>
      <a href="#tenants" class="tab-btn" data-page="tenants">Tenants</a>
      <a href="#income" class="tab-btn" data-page="income">Income</a>
      <a href="#expenses" class="tab-btn" data-page="expenses">Expenses</a>
      <a href="#maintenance" class="tab-btn" data-page="maintenance">Maintenance</a>
      <a href="#reports" class="tab-btn" data-page="reports">Reports</a>
    </nav>

    <div class="topbar-controls">
      <div class="topbar-user">
        <div class="user-avatar" id="user-avatar">AC</div>
        <span class="user-name" id="user-name">Loading...</span>
      </div>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="logout-btn" id="logout-btn" title="Sign out" aria-label="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>

    <!-- Mobile hamburger -->
    <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open navigation">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </header>

  <!-- Mobile nav drawer -->
  <div class="mobile-nav-overlay" id="mobile-nav-overlay" hidden></div>
  <div class="mobile-nav-drawer" id="mobile-nav-drawer" hidden>
    <nav class="mobile-nav-links" id="mobile-nav-links" aria-label="Mobile navigation">
      <a href="#dashboard" class="mobile-nav-item active" data-page="dashboard">Dashboard</a>
      <a href="#properties" class="mobile-nav-item" data-page="properties">Properties</a>
      <a href="#tenants" class="mobile-nav-item" data-page="tenants">Tenants</a>
      <a href="#income" class="mobile-nav-item" data-page="income">Income</a>
      <a href="#expenses" class="mobile-nav-item" data-page="expenses">Expenses</a>
      <a href="#maintenance" class="mobile-nav-item" data-page="maintenance">Maintenance</a>
      <a href="#reports" class="mobile-nav-item" data-page="reports">Reports</a>
    </nav>
    <div class="mobile-nav-footer">
      <div class="topbar-user">
        <div class="user-avatar" id="user-avatar-mobile">AC</div>
        <span class="user-name" id="user-name-mobile">Loading...</span>
      </div>
      <button class="logout-btn" id="logout-btn-mobile" title="Sign out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="main-content"></main>

  <footer class="app-footer">
    <span>&copy; 2026 PropFlow &middot; Dynamic Tax Services</span>
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
  </footer>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" hidden>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
